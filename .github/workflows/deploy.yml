name: Deploy

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  context:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.compute.outputs.mode }}
      bump_type: ${{ steps.compute.outputs.bump_type }}
      should_run: ${{ steps.compute.outputs.should_run }}
      skip_reason: ${{ steps.compute.outputs.skip_reason }}

    steps:
      - name: Resolve workflow context
        id: compute
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let mode = 'skip';
            let bumpType = 'patch';
            let shouldRun = 'false';
            let skipReason = '';

            if (eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              const isMerged = Boolean(pr?.merged);
              const isMainBase = pr?.base?.ref === 'main';

              if (isMerged && isMainBase) {
                mode = 'pr_merge';
                shouldRun = 'true';

                const title = (pr?.title || '').toLowerCase();
                if (title.includes('(major)')) {
                  bumpType = 'major';
                } else if (title.includes('(minor)')) {
                  bumpType = 'minor';
                }
              } else {
                skipReason = 'PR closed without merge to main.';
              }
            } else if (eventName === 'push') {
              mode = 'direct_push';
              shouldRun = 'true';

              const headSha = context.payload.after;

              try {
                const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: headSha,
                });

                const fromMergedPrToMain = response.data.some((pr) => {
                  return Boolean(pr.merged_at) && pr.base?.ref === 'main';
                });

                if (fromMergedPrToMain) {
                  mode = 'skip_duplicate_push';
                  shouldRun = 'false';
                  skipReason = 'Push event belongs to a merged PR already handled by pull_request trigger.';
                }
              } catch (error) {
                core.warning(`Could not resolve associated PRs for commit ${headSha}: ${error.message}`);
              }
            } else if (eventName === 'workflow_dispatch') {
              mode = 'manual';
              shouldRun = 'true';
            } else {
              skipReason = `Unsupported event: ${eventName}`;
            }

            core.setOutput('mode', mode);
            core.setOutput('bump_type', bumpType);
            core.setOutput('should_run', shouldRun);
            core.setOutput('skip_reason', skipReason);

  quality_gate:
    needs: context
    if: needs.context.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke pipeline
        run: npm run smoke:mvp

  bump_version:
    needs: [context, quality_gate]
    if: needs.context.outputs.mode == 'pr_merge'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "book-memory-release[bot]"
          git config user.email "book-memory-release[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        id: bump
        shell: bash
        run: |
          BUMP="${{ needs.context.outputs.bump_type }}"
          echo "Bumping version using: $BUMP"

          npm version "$BUMP" -m "chore(release): v%s"
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          git push origin HEAD:main --follow-tags
        env:
          GIT_AUTHOR_NAME: "book-memory-release[bot]"
          GIT_AUTHOR_EMAIL: "book-memory-release[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "book-memory-release[bot]"
          GIT_COMMITTER_EMAIL: "book-memory-release[bot]@users.noreply.github.com"

  deploy:
    needs: [context, quality_gate, bump_version]
    if: |
      needs.context.outputs.should_run == 'true' &&
      (needs.context.outputs.mode != 'pr_merge' || needs.bump_version.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve deploy version
        id: app_version
        shell: bash
        run: |
          if [ -n "${{ needs.bump_version.outputs.new_version }}" ]; then
            VERSION="${{ needs.bump_version.outputs.new_version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying version: $VERSION"

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_GOOGLE_BOOKS_API_KEY=${{ secrets.VITE_GOOGLE_BOOKS_API_KEY }}
          VITE_APP_VERSION=v${{ steps.app_version.outputs.version }}
          EOF

      - name: Build app
        run: npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_DIR }}
          dangerous-clean-slate: true
